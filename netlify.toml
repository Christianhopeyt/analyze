[build]
  publish = "."
  functions = "netlify/functions"

# Security & cache headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# SPA-style routing for /channel/* paths
[[redirects]]
  from = "/api/channel-analyzer"
  to   = "/.netlify/functions/channel-analyzer"
  status = 200

[[redirects]]
  from = "/api/niche-insights"
  to   = "/.netlify/functions/niche-insights"
  status = 200

[[redirects]]
  from = "/channel/*"
  to   = "/index.html"
  status = 200

[[redirects]]
  from = "/fr/blog/:slug.html"
  to   = "/fr/blog/:slug"
  status = 301
  force = true
