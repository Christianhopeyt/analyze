[build]
  publish = "."

# Register the edge function that injects the API key
[[edge_functions]]
  function = "inject-config"
  path = "/"

[[edge_functions]]
  function = "inject-config"
  path = "/index.html"

# Security & cache headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# SPA-style routing for /channel/* paths
[[redirects]]
  from = "/channel/*"
  to   = "/index.html"
  status = 200
