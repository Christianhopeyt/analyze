<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact – YouTube Analyzer by Norcanto</title>
  <meta name="description" content="Get in touch with the YouTube Analyzer by Norcanto team." />
  <link rel="stylesheet" href="../css/main.css" /><link rel="icon" type="image/png" href="../images/norcanto-logo.png" />
</head>
<body>
<header id="header"><div class="container"><div class="header-inner">
  <a href="../index.html" class="header-logo"><img src="../images/norcanto-logo.png" alt="Norcanto" class="site-logo-img" />YouTube Analyzer <span>by Norcanto</span></a>
  <nav class="header-nav"><a href="../index.html#analyzer">Channel Analysis</a><a href="../index.html#calculator">Calculator</a><a href="../blog/index.html">Blog</a></nav>
  <div class="header-controls"><button class="theme-toggle" aria-label="Toggle theme"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></button></div>
</div></div></header>
<main style="padding-top:68px;">
  <section class="section"><div class="container" style="max-width:600px;">
    <div class="section-header"><div class="section-divider"></div><h1>Contact Us</h1><p>We're here to help. Reach out to our team.</p></div>
    <div class="card" style="margin-bottom:32px;">
      <h3 style="margin-bottom:20px;font-size:1rem;">Send us a message</h3>
      <div class="form-group" style="margin-bottom:16px;"><label class="form-label">Your Name</label><input type="text" class="form-input" placeholder="Jane Smith" /></div>
      <div class="form-group" style="margin-bottom:16px;"><label class="form-label">Email Address</label><input type="email" class="form-input" placeholder="jane@example.com" /></div>
      <div class="form-group" style="margin-bottom:16px;"><label class="form-label">Subject</label>
        <select class="form-select"><option>General Inquiry</option><option>Bug Report</option><option>Feature Request</option><option>Partnership</option><option>Privacy Request</option></select>
      </div>
      <div class="form-group" style="margin-bottom:20px;"><label class="form-label">Message</label><textarea class="form-input" rows="5" style="height:auto;padding:12px;" placeholder="How can we help?"></textarea></div>
      <button class="btn btn-primary btn-lg" style="width:100%;justify-content:center;" onclick="alert('Thank you for your message! We will reply within 48 hours.')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
        Send Message
      </button>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
      <div class="card" style="text-align:center;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="28" height="28" style="color:var(--yt-red);margin:0 auto 10px;"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
        <div style="font-weight:600;font-size:0.875rem;margin-bottom:4px;">Email</div>
        <div style="font-size:0.82rem;color:var(--text-3);">hello@norcanto.com</div>
      </div>
      <div class="card" style="text-align:center;">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="28" height="28" style="color:var(--yt-red);margin:0 auto 10px;"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <div style="font-weight:600;font-size:0.875rem;margin-bottom:4px;">Response Time</div>
        <div style="font-size:0.82rem;color:var(--text-3);">Within 48 hours</div>
      </div>
    </div>
  </div></section>
</main>
<footer id="footer"><div class="container"><div class="footer-bottom"><div class="footer-copy">© 2026 YouTube Analyzer by Norcanto.</div><div class="footer-legal"><a href="../privacy/index.html">Privacy</a><a href="../terms/index.html">Terms</a><a href="index.html">Contact</a></div></div></div></footer>
<script src="../js/logo.js"></script><script src="../js/app.js"></script>
</body></html>
